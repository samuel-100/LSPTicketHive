version: 1.0
runtime: nodejs18
build:
  commands:
    build:
      - npm install --workspace=packages/shared --workspace=packages/database --workspace=apps/api
      - npx prisma generate --schema=packages/database/prisma/schema.prisma
      - npm run build --workspace=apps/api
run:
  command: node apps/api/dist/index.js
  network:
    port: 4000
  env:
    - name: PORT
      value: "4000"
    - name: NODE_ENV
      value: "production"
